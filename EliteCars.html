<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Cars | Site Oficial</title>
    <link rel="shortcut icon" href="imagem/carro-esporte.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/aceda93f3b.js" crossorigin="anonymous"></script>
</head>

<body>
    <!-- Colocando meu cabeçario/header -->
    <main>
        <header class="cabecalho">
            <!-- caixa para a logo -->
            <div class="div-img">
                <img src="imagem/carro-esporte.png" alt="Icon-header" class="img-header">
            </div>
            <!-- caixa para o titulodo header -->
            <div class="div-h1">
                <h1>Elite Cars</h1>
            </div>
            <!-- caixa para o menu do header -->
            <div class="ul-lista">
                <ul class="ul-lista">
                    <li>
                        <a href="">Inicio</a>
                    </li>

                    <li>
                        <a href="">Sobre</a>
                    </li>

                    <li>
                        <a href="">Contatos</a>
                    </li>
                </ul>
            </div>
        </header>
        <!-- fim do header -->

        <!-- Inicio Primeira Section -->
        <main>
            <section class="section-01">
                <!-- primeira caixa de conteudo -->
                <div class="div-01">
                    <img src="imagem/futuremoon-cars.jpg" alt="imagem-section-01" class="img-section-01">
                </div>

                <div class="div-02">
                    <p> <span>Elite Cars </span>curadoria exclusiva dos melhores veículos importados <br> para quem não
                        aceita o comum.
                    </p>
                </div>
            </section>

            <!-- inicio sectio 02 -->
            <section class="section-02">
                <div class="div-icon">
                    <i class="fa-brands fa-x-twitter"></i>
                    <i class="fa-brands fa-instagram"></i>
                    <i class="fa-regular fa-envelope"></i>
                </div>

                <div class="paragrafo-section-02">

                </div>
            </section>
        </main>
    </main>
</body>

</html>
